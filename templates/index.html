<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Success Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>🎓 Student Success Analytics Platform</h1>
    <p>Fill out the form below to determine if a student is at risk.</p>
    
    <form action="/predict" method="POST">
        <label>Age: <input type="number" name="age" min="15" max="22" value="17" required></label><br><br>
        
        <label>Study Time:
            <select name="studytime">
                <option value="1">< 2 hours</option>
                <option value="2">2 to 5 hours</option>
                <option value="3">5 to 10 hours</option>
                <option value="4">> 10 hours</option>
            </select>
        </label><br><br>
        
        <label>Past Failures: <input type="number" name="failures" min="0" value="0" required></label><br><br>
        <label>Absences: <input type="number" name="absences" min="0" value="0" required></label><br><br>
        
        <h3>Grades (Percentage System 0-100%)</h3>
        <label>G1 Grade (%): <input type="number" name="g1" min="0" max="100" value="50" required></label><br><br>
        <label>G2 Grade (%): <input type="number" name="g2" min="0" max="100" value="50" required></label><br><br>
        
        <h3>Support & Environment</h3>
        <label>Extra Educational Support: 
            <select name="schoolsup"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        <label>Family Educational Support: 
            <select name="famsup"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        <label>Paid Extra Classes: 
            <select name="paid"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        <label>Internet Access: 
            <select name="internet"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        <label>Higher Education Goal: 
            <select name="higher"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        <label>Romantic Relationship: 
            <select name="romantic"><option value="0">No</option><option value="1">Yes</option></select>
        </label><br><br>
        
        <button type="submit">Run Prediction</button>
    </form>
</body>
</html>
