<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
</head>
<body>
    <h1>Prediction Analysis</h1>
    
    {% if result == 1 %}
        <h2 style="color: green;">🎉 The student is LIKELY TO PASS.</h2>
        <p>Academic indicators show steady performance. Maintain support structures.</p>
    {% else %}
        <h2 style="color: red;">⚠️ The student is AT RISK of failing.</h2>
        <p>Early intervention is highly recommended! Consider tutoring resources.</p>
    {% endif %}
    
    <br>
    <a href="/">Go Back</a>
</body>
</html>
